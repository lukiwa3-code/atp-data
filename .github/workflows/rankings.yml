name: Update ATP Rankings

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "First ranking week to fetch, e.g. 2024-01-01. Use older date later if you want older rankings."
        required: false
        default: "2024-01-01"
      end_date:
        description: "Last ranking week to fetch. Leave empty for today."
        required: false
        default: ""
      force:
        description: "Re-download existing ranking JSON files"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

  schedule:
    # ATP publishes weekly rankings on Monday. This keeps the current snapshot fresh.
    - cron: "30 8 * * 1"

permissions:
  contents: write

jobs:
  rankings:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install requirements
        run: pip install -r requirements.txt

      - name: Update ranking snapshots
        env:
          RANKINGS_BACKFILL_START_DATE: ${{ github.event.inputs.start_date || '2024-01-01' }}
          RANKINGS_BACKFILL_END_DATE: ${{ github.event.inputs.end_date }}
        run: |
          EXTRA=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            EXTRA="--rankings-force"
          fi

          python scripts/update_atp.py --rankings-only \
            --rankings-start-date "$RANKINGS_BACKFILL_START_DATE" \
            ${RANKINGS_BACKFILL_END_DATE:+--rankings-end-date "$RANKINGS_BACKFILL_END_DATE"} \
            $EXTRA

      - name: Commit ranking data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/rankings
          git diff --cached --quiet && echo "No ranking changes" || git commit -m "Update ATP rankings"
          git push
