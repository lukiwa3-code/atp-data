name: Update ATP Rankings

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "Od kiedy pobierać rankingi, np. 2025-01-01"
        required: false
        default: "2025-01-01"
      end_date:
        description: "Do kiedy, puste = aktualny poniedziałek"
        required: false
        default: ""
      weeks_back:
        description: "Gdy start_date puste, ile ostatnich tygodni pobrać"
        required: false
        default: "8"
      force:
        description: "Wymuś ponowne pobranie istniejących plików"
        required: true
        default: false
        type: boolean

  schedule:
    - cron: "0 11 * * 1"

permissions:
  contents: write

jobs:
  rankings:
    runs-on: ubuntu-latest

    env:
      ATP_USE_PLAYWRIGHT: "1"
      ATP_CF_WAIT_SECONDS: "75"
      ATP_PLAYWRIGHT_TIMEOUT: "120"
      START_DATE: ${{ github.event_name == 'workflow_dispatch' && inputs.start_date || '' }}
      END_DATE: ${{ github.event_name == 'workflow_dispatch' && inputs.end_date || '' }}
      WEEKS_BACK: ${{ github.event_name == 'workflow_dispatch' && inputs.weeks_back || '8' }}
      FORCE: ${{ github.event_name == 'workflow_dispatch' && inputs.force || false }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install libraries
        run: |
          pip install -r requirements.txt

      - name: Install Playwright browser
        run: |
          python -m playwright install --with-deps chromium
          python - <<'PY'
          from playwright.sync_api import sync_playwright
          with sync_playwright() as p:
              b = p.chromium.launch(headless=True)
              b.close()
          print("Playwright Chromium OK")
          PY

      - name: Update ATP rankings
        run: |
          ARGS=""

          if [ -n "$START_DATE" ]; then
            ARGS="$ARGS --start-date $START_DATE"
          fi

          if [ -n "$END_DATE" ]; then
            ARGS="$ARGS --end-date $END_DATE"
          fi

          if [ -z "$START_DATE" ] && [ -n "$WEEKS_BACK" ]; then
            ARGS="$ARGS --weeks-back $WEEKS_BACK"
          fi

          if [ "$FORCE" = "true" ]; then
            ARGS="$ARGS --force"
          fi

          echo "python scripts/update_rankings.py $ARGS"
          python scripts/update_rankings.py $ARGS

      - name: Commit ranking changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/rankings data/rankings_index.json
          git diff --cached --quiet || git commit -m "Update ATP rankings"
          git push
