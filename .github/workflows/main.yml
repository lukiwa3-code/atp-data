name: Update ATP Data

on:
  workflow_dispatch:
    inputs:
      update_mode:
        description: "full = historia + bieżące, live = tylko aktualne"
        required: true
        default: "full"
        type: choice
        options:
          - full
          - live
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    env:
      # Przy ręcznym uruchomieniu domyślnie pobieramy historię.
      # Przy harmonogramie co 6h pobieramy tylko live, żeby nie mielić 400+ turniejów.
      UPDATE_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.update_mode || 'live' }}
      ATP_USE_PLAYWRIGHT: "1"
      SAVE_DEBUG_HTML: "0"
      ATP_CF_WAIT_SECONDS: "75"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install libraries
        run: |
          pip install -r requirements.txt

      - name: Install Playwright browser
        run: |
          python -m playwright install --with-deps chromium
          python - <<'PY'
          from playwright.sync_api import sync_playwright
          with sync_playwright() as p:
              b = p.chromium.launch(headless=True)
              b.close()
          print("Playwright Chromium OK")
          PY

      - name: Update ATP data
        run: |
          python scripts/update_atp.py

      - name: Commit data changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Update ATP data and results"
          git push
